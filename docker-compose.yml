services:
  wabi-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: wabi-web
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - WABI_AI_URL=http://wabi-ai:8001/invoke
      - WABI_REDIS_URL=redis://wabi-redis:6380/0
      - WABI_DB_URL=postgresql://wabi_user:wabi_password@wabi-postgres:5433/wabi_chat
    depends_on:
      wabi-ai:
        condition: service_started
      wabi-postgres:
        condition: service_healthy
      wabi-redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - wabi-network
    # 🔥 高并发优化
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  wabi-ai:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai
    container_name: wabi-ai
    ports:
      - "8001:8001"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - WABI_REDIS_URL=redis://wabi-redis:6380/0
    depends_on:
      wabi-redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - wabi-network
    # 🔥 高并发优化
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 3G

  wabi-postgres:
    image: postgres:15-alpine
    container_name: wabi-postgres
    environment:
      POSTGRES_USER: wabi_user
      POSTGRES_PASSWORD: wabi_password
      POSTGRES_DB: wabi_chat
    command: postgres -c max_connections=500 -p 5433
    ports:
      - "5433:5433"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wabi_user -d wabi_chat -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wabi-network

  wabi-redis:
    image: redis:7-alpine
    container_name: wabi-redis
    command: redis-server --port 6380
    ports:
      - "6380:6380"
    volumes:
      - ./data/redisdata:/data
    restart: unless-stopped
    networks:
      - wabi-network

networks:
  wabi-network:
    driver: bridge
